apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
        debug {
            // Shared debug keystore checked into the repo so every machine/CI
            // signs debug builds with the same certificate. This avoids
            // "signatures do not match" / update-failed errors when reinstalling
            // a debug APK built on a different machine. Not a secret — the
            // password is the well-known Android debug default.
            storeFile file("$rootDir/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    defaultConfig {
        applicationId "app.launch0"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode project.hasProperty('versionCodeOverride') ? project.versionCodeOverride.toInteger() : 96
        versionName project.hasProperty('versionNameOverride') ? project.versionNameOverride : "v6.2.15"

        resourceConfigurations += ["en", "ar", "de", "es-rES", "es-rUS", "fr", "he", "hr", "hu", "in", "it", "ja", "nl", "pl", "pt-rBR", "ru-rRU", "sv", "tr", "uk", "zh"]
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            def keystoreFile = System.getenv("LAUNCH0_KEYSTORE_FILE")
            if (keystoreFile) {
                storeFile file(keystoreFile)
                storePassword System.getenv("LAUNCH0_KEYSTORE_PASSWORD")
                keyAlias System.getenv("LAUNCH0_KEY_ALIAS")
                keyPassword System.getenv("LAUNCH0_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            debuggable false
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Only apply the signing config when the keystore env var is present
            // (e.g. in CI). Local debug builds are unaffected.
            if (System.getenv("LAUNCH0_KEYSTORE_FILE")) {
                signingConfig signingConfigs.release
            }
        }
        debug {
            debuggable true
            minifyEnabled false
            applicationIdSuffix ".debug"
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        viewBinding = true
        buildConfig = true
    }
    namespace 'app.launch0'
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation libs.kotlin.stdlib
    implementation libs.core.ktx
    implementation libs.appcompat
    implementation libs.recyclerview
    implementation libs.viewpager2

    // Android lifecycle
    implementation libs.lifecycle.extensions
    implementation libs.lifecycle.viewmodel.ktx

    // Navigation
    implementation libs.navigation.fragment.ktx

    // Work Manager
    implementation libs.work.runtime.ktx

    //Material dependency
    implementation libs.material

}