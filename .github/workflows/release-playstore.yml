name: Release to Play Store

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. v6.3.0)'
        required: true
        type: string
      version_code:
        description: 'Version code (integer, must be higher than previous release)'
        required: true
        type: string
      track:
        description: 'Play Store track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > launch0-upload.keystore

      - name: Build signed release AAB
        run: |
          ./gradlew bundleRelease \
            -PversionNameOverride=${{ inputs.version_name }} \
            -PversionCodeOverride=${{ inputs.version_code }}
        env:
          LAUNCH0_KEYSTORE_FILE: ${{ github.workspace }}/launch0-upload.keystore
          LAUNCH0_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          LAUNCH0_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          LAUNCH0_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore launch0-upload.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: app.launch0
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          releaseName: "Launch0 ${{ inputs.version_name }}"

      - name: Build release APK for GitHub Release
        run: |
          ./gradlew assembleRelease \
            -PversionNameOverride=${{ inputs.version_name }} \
            -PversionCodeOverride=${{ inputs.version_code }}

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          ${BUILD_TOOLS}apksigner sign \
            --ks launch0-upload.keystore --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.version_name }}" \
            app/build/outputs/apk/release/app-release.apk \
            --title "Launch0 ${{ inputs.version_name }}" \
            --notes "Release ${{ inputs.version_name }} (version code ${{ inputs.version_code }})"

      - name: Clean up keystore
        if: always()
        run: rm -f launch0-upload.keystore
