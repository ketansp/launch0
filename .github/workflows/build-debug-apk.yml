name: Build Debug APK

# Manually-triggered dev build. Builds the debug APK and publishes it to a
# rolling "debug-latest" pre-release so there is always one stable, tappable
# download link for installing on a phone:
#
#   https://github.com/${{ github.repository }}/releases/download/debug-latest/app-debug.apk
#
# Trigger from a phone: open the repo on github.com in your mobile browser with
# "Request desktop site", go to Actions -> "Build Debug APK" -> Run workflow.
# When it finishes, open the link above on the device and tap to install.
#
# Note: on a public repo the release asset is publicly downloadable. The debug
# APK is built from already-public source, so this exposes only a prebuilt
# binary, not any secret.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Publish to rolling debug-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Remove the previous rolling release and its tag (ignore if absent),
          # then recreate so the download URL stays stable but points at this build.
          gh release delete debug-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create debug-latest \
            app/build/outputs/apk/debug/app-debug.apk \
            --target "$GITHUB_SHA" \
            --title "Debug build (latest)" \
            --notes "Latest debug APK — commit ${GITHUB_SHA::7}, built $(date -u '+%Y-%m-%d %H:%M UTC'). Tap app-debug.apk to install." \
            --prerelease
