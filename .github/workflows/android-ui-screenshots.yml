name: Android UI Screenshots

# On every pull request (opened / new commits pushed) and on manual dispatch:
#   1. Build the debug APK.
#   2. Boot an Android emulator (virtual device) on the runner.
#   3. Install the APK, drive a few screens with real gestures, and screenshot
#      each step (see .github/scripts/ui_screenshots.sh).
#   4. Publish the screenshots so they render INLINE:
#        - as a sticky comment in the PR thread, and
#        - in the run page's Job Summary.
#      Because GitHub renders images only from a URL (and strips base64 data:
#      images), the PNGs are pushed to an orphan `ci-screenshots` branch and
#      referenced via their raw.githubusercontent.com URLs.
#
#   Note: the plain-text Actions console log cannot render images; the
#   screenshots appear in the PR comment and the Job Summary.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Allow manual runs too (no PR comment in that case, just the job summary).
  workflow_dispatch:

# contents: write  -> push screenshots to the ci-screenshots branch
# pull-requests: write -> post/update the sticky PR comment
permissions:
  contents: write
  pull-requests: write

jobs:
  ui-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build debug APK
        run: ./gradlew assembleDebug

      # The emulator needs hardware acceleration (KVM) to boot in reasonable
      # time on the GitHub-hosted Linux runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run UI walkthrough on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash .github/scripts/ui_screenshots.sh

      - name: Publish screenshots (PR comment + run summary)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/publish_screenshots.sh
